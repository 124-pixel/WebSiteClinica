<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Médico</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../public/assets/design/stylePhysicians.css">
<link rel="stylesheet" href="../../public/assets/design/navbar.css">
<link rel="stylesheet" href="../../public/assets/design/stylefooter.css">
<script src="../../public/assets/engine/navbar.js" defer></script>
<script src="../../public/assets/engine/physicians.js" defer></script>
<script src="../../public/assets/engine/footer.js" defer></script>
</head>
<body>

  <!-- BREADCRUMB -->
   <div id="navbar-container"></div>

  <h1>Encuentra al especialista que necesitas</h1>

  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h3>Filtra tu búsqueda</h3>

      <div class="filter-group">
        <label>Por tipo de atención</label>
        <div class="checkbox-item">
          <input type="checkbox" id="presencial" onchange="applyFilters()" />
          <span>Presencial</span>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="virtual" onchange="applyFilters()" />
          <span>Virtual</span>
        </div>
      </div>

      <div class="filter-group">
        <label>Por Sede</label>
        <div class="checkbox-item">
          <input type="checkbox" value="La Molina" class="sede-cb" onchange="applyFilters()" />
          <span>La Molina</span>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" value="Lima" class="sede-cb" onchange="applyFilters()" />
          <span>Lima</span>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" value="San Borja" class="sede-cb" onchange="applyFilters()" />
          <span>San Borja</span>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" value="San Isidro" class="sede-cb" onchange="applyFilters()" />
          <span>San Isidro</span>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" value="Surco" class="sede-cb" onchange="applyFilters()" />
          <span>Surco</span>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <div class="main">
      <div class="search-row">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="Buscar por nombre" oninput="applyFilters()" />
        </div>
        <div class="select-wrap">
          <select id="specialtyFilter" onchange="applyFilters()">
            <option value="">Filtrar por especialidad</option>
          </select>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>

      <p class="results-count" id="resultsCount"></p>

      <div class="grid" id="grid"></div>

      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  
  <div class="footer-border">
    </div>
    
    <div id="footer-container"></div>


</body>
</html>
